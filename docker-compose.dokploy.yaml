# Dittofeed Lite — adapted for Dokploy with a custom domain.
#
# How it differs from docker-compose.lite.yaml:
#   * The `lite` service joins Dokploy's external `dokploy-network` and is
#     exposed through Traefik via labels (TLS + custom domain), instead of
#     publishing port 3000 on the host.
#   * Internal services (postgres, clickhouse, temporal) no longer publish
#     ports to the host — they talk over the private compose network only.
#   * DASHBOARD_URL is set (base domain for API + dashboard; also drives CORS
#     allowedOrigins and the signout redirect). DASHBOARD_API_BASE matches it.
#
# Set the variables marked REQUIRED in Dokploy's "Environment" tab (or a .env).
#
# ---------------------------------------------------------------------------
# Postgres: bundled container vs. external/dedicated server
# ---------------------------------------------------------------------------
# The bundled `postgres` service is gated behind the `embedded-postgres`
# Compose profile, so you choose one of two modes via env vars in Dokploy:
#
#   A) Bundled DB (default): run Postgres inside this stack.
#      COMPOSE_PROFILES=embedded-postgres
#      (DATABASE_HOST defaults to the internal `postgres` service.)
#
#   B) External DB on a dedicated server: do NOT enable the profile, and point
#      the app + Temporal at your server:
#      COMPOSE_PROFILES=                       # leave empty / omit -> no local pg
#      DATABASE_HOST=db.example.com
#      DATABASE_PORT=5432
#      DATABASE_USER=dittofeed
#      DATABASE_PASSWORD=...
#      DATABASE_NAME=dittofeed                 # optional; defaults to "dittofeed"
#      The external server must contain the DATABASE_NAME database, and Temporal
#      uses the same server (it auto-creates `temporal` / `temporal_visibility`,
#      which needs CREATE DATABASE privileges). ClickHouse can be externalized
#      the same way: set CLICKHOUSE_HOST and don't run clickhouse-server.
#
# Note: the top-level `version:` field is intentionally omitted — it is obsolete
# in current Docker Compose / the Compose Spec, which is also what lets services
# use `mem_limit:` (enforced outside Swarm) instead of `deploy.resources`.

x-database-credentials: &database-credentials
  DATABASE_USER: ${DATABASE_USER:-postgres}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
x-clickhouse-credentials: &clickhouse-credentials
  CLICKHOUSE_USER: ${CLICKHOUSE_USER:-dittofeed}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD}
x-backend-app-env: &backend-app-env
  <<: [*clickhouse-credentials, *database-credentials]
  NODE_ENV: production
  DATABASE_HOST: ${DATABASE_HOST:-postgres}
  DATABASE_PORT: ${DATABASE_PORT:-5432}
  # Postgres database name the app connects to. Must match POSTGRES_DB on the
  # bundled container, or the database you created on an external server.
  DATABASE_NAME: ${DATABASE_NAME:-dittofeed}
  # Extra Postgres connection params, appended to the connection string. For an
  # external/managed DB that enforces SSL, set DATABASE_PARAMS=sslmode=no-verify
  # (encrypt without CA verification) or sslmode=verify-full with a trusted CA.
  DATABASE_PARAMS: ${DATABASE_PARAMS:-}
  CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-http://clickhouse-server:8123}
  TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
  WORKSPACE_NAME: ${WORKSPACE_NAME:-Default}
  AUTH_MODE: ${AUTH_MODE:-single-tenant}
  # Traefik terminates TLS in front of the app, so the public site is HTTPS.
  # Mark the session cookie Secure (silences the dashboard warning).
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
  SECRET_KEY: "${SECRET_KEY:?generate with openssl rand -base64 32}"
  PASSWORD: ${PASSWORD:?set the dashboard login PASSWORD}
  # Public URL of your deployment. DASHBOARD_URL is the base domain for the API
  # and dashboard, and also seeds CORS allowedOrigins + the signout redirect.
  DASHBOARD_URL: "https://${DOMAIN:?set DOMAIN, e.g. dittofeed.example.com}"
  DASHBOARD_API_BASE: "https://${DOMAIN}"
  # AI / LLM configuration for journey generation. Set the secret LLM_API_KEY in
  # Dokploy's Environment settings (do NOT hardcode it here). Leaving it empty
  # keeps the stack healthy; AI endpoints just return "not configured" (503)
  # until a key is set. Defaults to Gemini; switch provider/model via env.
  LLM_PROVIDER: ${LLM_PROVIDER:-google}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
  LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
  LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-4096}

services:
  lite:
    # Build the all-in-one image from this repo's source instead of pulling the
    # upstream release, so local code changes (e.g. journey node template
    # properties) are included. Dokploy clones the repo and builds this.
    build:
      context: .
      dockerfile: packages/lite/Dockerfile
    image: dittofeed-lite:custom
    restart: always
    command: node --max-old-space-size=${LITE_MEM_LIMIT:-1638} ./packages/lite/dist/scripts/startLite.js --workspace-name=${WORKSPACE_NAME:-Default}
    logging:
      driver: "local"
    # mem_limit (not deploy.resources) so the cap is enforced under plain
    # Compose/Dokploy, not just Swarm. Keep the Node heap (--max-old-space-size)
    # at ~75-80% of this so non-heap memory has headroom before an OOM-kill.
    mem_limit: ${LITE_CONTAINER_MEM_LIMIT:-2048m}
    # No hard dependency on `postgres`: it may be external (profile disabled).
    # The app retries its DB connection on boot regardless of start order.
    depends_on:
      - temporal
      - clickhouse-server
    environment:
      <<: *backend-app-env
      # Bootstraps the DB + ClickHouse schema on first boot.
      # Set BOOTSTRAP=false in Dokploy once the stack is up and healthy.
      BOOTSTRAP: ${BOOTSTRAP:-true}
    networks:
      - dittofeed-network-lite
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # --- HTTPS router (custom domain) ---
      - "traefik.http.routers.dittofeed.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.dittofeed.entrypoints=websecure"
      - "traefik.http.routers.dittofeed.tls=true"
      - "traefik.http.routers.dittofeed.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dittofeed.service=dittofeed"
      - "traefik.http.services.dittofeed.loadbalancer.server.port=3000"
      # --- HTTP router -> redirect to HTTPS ---
      - "traefik.http.routers.dittofeed-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.dittofeed-web.entrypoints=web"
      - "traefik.http.routers.dittofeed-web.middlewares=dittofeed-redirect"
      - "traefik.http.middlewares.dittofeed-redirect.redirectscheme.scheme=https"

  # Run upgrades / migrations: `docker compose run --rm admin-cli ...`
  admin-cli:
    image: ${ADMIN_CLI_REPOSITORY:-dittofeed/dittofeed-admin-cli}:${IMAGE_TAG:-v0.24.0}
    entrypoint: []
    profiles: ["admin-cli"]
    command: tail -f /dev/null
    tty: true
    logging:
      driver: "local"
    depends_on:
      - temporal
      - clickhouse-server
    environment:
      <<: *backend-app-env
    networks:
      - dittofeed-network-lite

  temporal:
    container_name: temporal
    restart: always
    logging:
      driver: "local"
    # Postgres may be external (embedded-postgres profile disabled); Temporal's
    # auto-setup retries POSTGRES_SEEDS, so no hard depends_on is needed.
    environment:
      - DB=postgresql
      - DB_PORT=${DATABASE_PORT:-5432}
      - POSTGRES_USER=${DATABASE_USER:-postgres}
      - POSTGRES_PWD=${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
      - POSTGRES_SEEDS=${DATABASE_HOST:-postgres}
      # Postgres TLS. The auto-setup image needs TWO sets of vars with INVERSE
      # host-verification polarity: POSTGRES_TLS_* drive the schema setup tool,
      # SQL_* drive the running server. For an external/managed DB that enforces
      # SSL, set TEMPORAL_SQL_TLS=true (and leave host verification off):
      #   POSTGRES_TLS_ENABLED=true / SQL_TLS_ENABLED=true (encrypt)
      #   POSTGRES_TLS_DISABLE_HOST_VERIFICATION=true + SQL_HOST_VERIFICATION=false
      - POSTGRES_TLS_ENABLED=${POSTGRES_TLS_ENABLED:-false}
      - POSTGRES_TLS_DISABLE_HOST_VERIFICATION=${POSTGRES_TLS_DISABLE_HOST_VERIFICATION:-true}
      - SQL_TLS_ENABLED=${SQL_TLS_ENABLED:-false}
      - SQL_HOST_VERIFICATION=${SQL_HOST_VERIFICATION:-false}
      # The schema-setup tool (temporal-sql-tool) reads its OWN TLS env vars,
      # separate from the server's SQL_TLS_ENABLED above. On the 1.22.4 image,
      # auto-setup.sh does NOT pass --tls, so POSTGRES_TLS_ENABLED is a no-op for
      # setup; the tool instead honors SQL_TLS / SQL_TLS_DISABLE_HOST_VERIFICATION
      # directly. Default SQL_TLS to mirror SQL_TLS_ENABLED so one toggle covers
      # both the server and schema setup.
      - SQL_TLS=${SQL_TLS:-${SQL_TLS_ENABLED:-false}}
      - SQL_TLS_DISABLE_HOST_VERIFICATION=${SQL_TLS_DISABLE_HOST_VERIFICATION:-true}
      # Managed providers (Neon, etc.) don't expose a `postgres`/`defaultdb`
      # maintenance database and often withhold CREATEDB, so auto-setup's
      # `create-database` step fails. Set SKIP_DB_CREATE=true and pre-create the
      # `temporal` and `temporal_visibility` databases yourself; setup-schema /
      # update-schema then run against them directly.
      - SKIP_DB_CREATE=${SKIP_DB_CREATE:-false}
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/prod.yaml
    image: temporalio/auto-setup:${TEMPORAL_VERSION:-1.22.4}
    labels:
      kompose.volume.type: configMap
    networks:
      - dittofeed-network-lite
    volumes:
      - ./packages/backend-lib/temporal-dynamicconfig:/etc/temporal/config/dynamicconfig

  postgres:
    image: postgres:${POSTGRES_VERSION:-15}
    restart: always
    # Bundled DB. Enable with COMPOSE_PROFILES=embedded-postgres. Omit the
    # profile to run against an external Postgres (set DATABASE_HOST etc.).
    profiles:
      - embedded-postgres
    logging:
      driver: "local"
    environment:
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
      - POSTGRES_USER=${DATABASE_USER:-postgres}
      - POSTGRES_DB=${DATABASE_NAME:-dittofeed}
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - dittofeed-network-lite

  clickhouse-server:
    image: clickhouse/clickhouse-server:24.12.6.70-alpine
    restart: always
    logging:
      driver: "local"
    # Most memory-hungry service; enforced via mem_limit (not Swarm-only
    # deploy.resources). No CPU limit by design.
    mem_limit: ${CLICKHOUSE_CONTAINER_MEM_LIMIT:-4096m}
    environment:
      <<: *clickhouse-credentials
    volumes:
      - clickhouse_lib:/var/lib/clickhouse
      - clickhouse_log:/var/log/clickhouse-server
    networks:
      - dittofeed-network-lite

volumes:
  postgres:
  clickhouse_lib:
  clickhouse_log:

networks:
  dittofeed-network-lite:
    driver: bridge
  # Created and managed by Dokploy; Traefik lives here.
  dokploy-network:
    external: true
